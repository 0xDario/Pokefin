name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  frontend:
    name: Frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # Lint is reported but not blocking yet - the codebase has 15
      # pre-existing React 19 / Next 16 strict-mode violations (inline
      # components, setState-in-effect) that were never caught because
      # `next lint` was broken on master. Fixing them is a separate PR.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
      - run: npm test -- --ci

  npm-audit:
    name: npm audit (high+ severity)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm audit --audit-level=high --production

  python:
    name: Python (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.txt --strict

  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
